# Docker Compose for local development
# Usage: docker compose -f docker-compose.dev.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: operly-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: operly
      POSTGRES_PASSWORD: operly123
      POSTGRES_DB: operly_dev
    ports:
      - "5432:5432"
    volumes:
      - operly_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U operly -d operly_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  operly_pgdata:
